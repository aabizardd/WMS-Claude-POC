# Netlify configuration — hosts the React (Vite) frontend from the monorepo.
[build]
  base = "frontend"          # run the build inside the frontend/ package
  command = "npm run build"  # tsc -b && vite build
  publish = "dist"           # → frontend/dist

[build.environment]
  NODE_VERSION = "20"
  # VITE_API_URL is set in the Netlify UI (Site settings → Environment) so it is
  # baked into the build, e.g. https://<your-backend>.up.railway.app/api
  # (Split-origin: the backend must allow this site via FRONTEND_ORIGIN.)

# SPA fallback — let React Router handle client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────
# Mirrors frontend/nginx-security-headers.conf — keep the two in sync.
# NOTE: connect-src must list the API origin here, because Netlify is a
# split-origin deploy (VITE_API_URL points at the backend). Replace the
# placeholder below with your backend origin, or the app cannot call the API.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://REPLACE-WITH-BACKEND-ORIGIN; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

# ── Optional: same-origin API proxy (no CORS) ──────────────────────────────
# Instead of setting VITE_API_URL, forward /api to the backend here and leave
# VITE_API_URL empty (frontend defaults to "/api"). Note: Netlify proxies have
# body-size limits — for the 10 MB complaint evidence uploads prefer the direct
# split-origin approach above.
#
# [[redirects]]
#   from = "/api/*"
#   to = "https://<your-backend>.up.railway.app/api/:splat"
#   status = 200
#   force = true

# Render Blueprint — one-click provision of DB + backend + frontend.
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: wms-db
    databaseName: wms
    user: wms
    plan: starter # or free for testing

services:
  # --- Backend (NestJS) ---
  - type: web
    name: wms-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    # Apply migrations on each deploy, then start. Keep a single instance
    # (the ERP sync scheduler uses setInterval — multiple instances duplicate syncs).
    preDeployCommand: npx prisma migrate deploy
    startCommand: node dist/main
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: DATABASE_URL
        fromDatabase:
          name: wms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      # Set to the deployed frontend URL after first deploy.
      - key: FRONTEND_ORIGIN
        sync: false
      # ERP / Oracle bridge — set as secrets in the dashboard.
      - key: ERP_BASE_URL
        sync: false
      - key: ERP_CLIENT_ID
        sync: false
      - key: ERP_CLIENT_SECRET
        sync: false
      - key: ERP_SYNC_PAGE_SIZE
        value: '200'
      - key: ERP_SYNC_PAGE_DELAY_MS
        value: '1500'
      - key: ERP_SYNC_SCHEDULER_ENABLED
        value: 'true'
      - key: ERP_SYNC_INTERVAL_MS
        value: '60000'

  # --- Frontend (React static) ---
  - type: web
    name: wms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Point the SPA at the backend's public URL (set after backend deploys).
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

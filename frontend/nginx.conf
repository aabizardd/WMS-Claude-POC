server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't advertise the nginx version.
  server_tokens off;

  include /etc/nginx/snippets/security-headers.conf;

  # Allow base64 image evidence (complaints) — backend accepts up to 10mb.
  client_max_body_size 12m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml image/svg+xml;
  gzip_min_length 1024;

  # Cache hashed static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    # This block has its own add_header, so the server-level ones are NOT
    # inherited — re-include them or the JS/CSS ship with no security headers.
    include /etc/nginx/snippets/security-headers.conf;
    try_files $uri =404;
  }

  # Same-origin API: forward /api to the backend service. This avoids CORS
  # entirely. In docker-compose the host is the "backend" service name.
  # (Remove this block if the frontend calls the backend via VITE_API_URL.)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # SPA fallback for React Router client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

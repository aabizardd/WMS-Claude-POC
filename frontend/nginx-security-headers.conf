# Security headers for the static frontend.
#
# IMPORTANT: nginx only inherits add_header from an outer block when the current
# block declares NO add_header of its own. `location /assets/` sets its own
# Cache-Control, which would silently drop every header below. That is why this
# lives in a snippet and is included in each block that needs it — do not move
# these back inline unless every location is re-checked.
#
# `always` keeps the headers on error responses (4xx/5xx) too.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# TLS is terminated at Cloudflare; the browser<->Cloudflare leg is HTTPS, so the
# browser honours this even though nginx itself listens on :80.
# No includeSubDomains / preload — locking subdomains in is hard to undo.
add_header Strict-Transport-Security "max-age=31536000" always;

# CSP tuned to what this app actually does (verified against the source):
#   script-src 'self'        — the built index.html has no inline script.
#   style-src 'unsafe-inline'— recharts (Dashboard) sets inline styles; without
#                              this the dashboard renders broken. Weakens CSS
#                              injection defence only; script-src stays strict,
#                              which is what actually blocks XSS.
#   fonts.googleapis/gstatic — index.html loads the Poppins webfont.
#   img-src data:            — complaint evidence is base64 (FileReader
#                              readAsDataURL); without it the photos go blank.
#   connect-src 'self'       — /api is proxied same-origin by this nginx. For a
#                              split-origin deploy (VITE_API_URL), add the API
#                              origin here.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
